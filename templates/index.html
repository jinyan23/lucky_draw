<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Lucky Draw</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='styles.css') }}">
  </head>
  <body>
    <canvas id="confetti-canvas"></canvas>
    <main class="container">
      <header class="page-header">
        <section class="card title-panel" aria-label="Application title">
          <h1>🌸 Lucky Draw 🌸</h1>
        </section>

        <section class="card participant-panel" aria-label="Add participants">
          <label for="adhoc-participant" class="sr-only">Participant name</label>
          <div class="participant-panel-row">
            <input id="adhoc-participant" type="text" placeholder="Name">
            <button id="add-participant-btn" type="button" disabled>Add</button>
          </div>
          <p id="adhoc-status" class="status"></p>
        </section>
      </header>

      <section class="main-content">
        <section class="card action-card">
          <div class="button-row action-buttons">
            <button id="next-btn" type="button" disabled>Next</button>
            <button id="draw-btn" type="button" disabled>Draw</button>
            <button id="redraw-btn" type="button" disabled>Redraw</button>
          </div>
          <p id="action-status" class="status"></p>
        </section>

        <section class="card results-card">
          <h2 id="results-header">- (0 winners)</h2>
          <table id="results-table">
            <tbody id="results-body"></tbody>
          </table>
        </section>
      </section>
    </main>

    <script src="{{ url_for('static', filename='app.js') }}"></script>
  </body>
</html>
